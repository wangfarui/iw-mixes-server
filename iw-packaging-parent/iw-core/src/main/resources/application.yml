# iw-core aggregates auth, bookkeeping, eat and points into one JVM.
iw:
  redis:
    host: ${IW_REDIS_HOST:127.0.0.1}
    port: ${IW_REDIS_PORT:6379}
    database: ${IW_REDIS_DATABASE:0}
    username: ${IW_REDIS_USERNAME:}
    password: ${IW_REDIS_PASSWORD:}
  db:
    driver-class: ${IW_DB_DRIVER_CLASS:}
    url: ${IW_DB_URL:}
    username: ${IW_DB_USERNAME:}
    password: ${IW_DB_PASSWORD:}
  feign:
    secret: ${IW_INTERNAL_SECRET:dev-secret}
  web:
    env: ${IW_WEB_ENV:dev}
    api:
      prefix: ${IW_WEB_API_PREFIX:/}
  auth:
    application-account:
      aes-key: ${IW_AUTH_APPLICATION_ACCOUNT_AES_KEY:0123456789abcdef0123456789abcdef}
    managed-secret:
      aes-key: ${IW_AUTH_MANAGED_SECRET_AES_KEY:managed-secret-dev-key-000000001}
  ding-talk:
    enabled: ${IW_DING_TALK_ENABLED:false}
    access-token: ${IW_DING_TALK_ACCESS_TOKEN:}
    secret: ${IW_DING_TALK_SECRET:}
  remote:
    auth:
      base-url: http://127.0.0.1:${server.port}
    points:
      base-url: http://127.0.0.1:${server.port}
    external:
      base-url: ${IW_EXTERNAL_BASE_URL:http://127.0.0.1:18006}
  local-gateway:
    enabled: false
    external-base-url: ${IW_EXTERNAL_BASE_URL:http://127.0.0.1:18006}
    timeout-seconds: ${IW_LOCAL_GATEWAY_TIMEOUT_SECONDS:30}
  dao:
    dataPermission:
      enabled: true
      enable-table-names:
        - base_application_account
        - base_managed_secret
        - base_website_navigation
        - base_ai_task
        - bookkeeping_records
        - bookkeeping_actions
        - bookkeeping_budget
        - bookkeeping_wallet
        - bookkeeping_wallet_records
        - bookkeeping_membership_subscription
        - points_total
        - points_records
        - points_task_basics
        - points_task_group
        - points_task_plan
        - points_task_fixed
        - eat_meal
        - eat_fridge_food
        - eat_dishes
        - wardrobe_item
        - wardrobe_outfit
        - wardrobe_outfit_item
        - wardrobe_wear_record
        - wardrobe_wear_record_item
      share-scope-enable-table-names:
        - bookkeeping_records

aliyun:
  sms:
    sign-name: ${ALIYUN_SMS_SIGN_NAME:}
    template-code: ${ALIYUN_SMS_TEMPLATE_CODE:}
  email:
    account-name: ${ALIYUN_EMAIL_ACCOUNT_NAME:}
    from-alias: ${ALIYUN_EMAIL_FROM_ALIAS:Wray}
  oss:
    access-key-id: ${ALIYUN_OSS_ACCESS_KEY_ID:}
    access-key-secret: ${ALIYUN_OSS_ACCESS_KEY_SECRET:}
    base-url: ${ALIYUN_OSS_BASE_URL:}
    endpoint: ${ALIYUN_OSS_ENDPOINT:}
    bucket-name: ${ALIYUN_OSS_BUCKET_NAME:}
    upload-parent-dir: ${ALIYUN_OSS_UPLOAD_PARENT_DIR:}

server:
  port: ${IW_CORE_PORT:18080}

spring:
  application:
    name: iw-core-service
  profiles:
    default: dev
  cloud:
    openfeign:
      client:
        config:
          internal-client:
            connectTimeout: ${IW_EXTERNAL_FEIGN_CONNECT_TIMEOUT_MS:5000}
            readTimeout: ${IW_EXTERNAL_FEIGN_READ_TIMEOUT_MS:180000}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

springdoc:
  swagger-ui:
    path: /doc.html
  packages-to-scan:
    - com.itwray.iw.auth.controller
    - com.itwray.iw.bookkeeping.controller
    - com.itwray.iw.eat.controller
    - com.itwray.iw.points.controller
    - com.itwray.iw.wardrobe.controller

---
spring:
  config:
    activate:
      on-profile: dev

server:
  port: ${IW_CORE_PORT:18000}

iw:
  local-gateway:
    enabled: true
    external-base-url: ${IW_EXTERNAL_BASE_URL:http://127.0.0.1:18006}

---
spring:
  config:
    activate:
      on-profile: prod

iw:
  web:
    env: ${IW_WEB_ENV:prod}
