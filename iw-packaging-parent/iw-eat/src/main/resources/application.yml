# iw配置
iw:
  redis:
    host: ${IW_REDIS_HOST:127.0.0.1}
    port: ${IW_REDIS_PORT:6379}
    database: ${IW_REDIS_DATABASE:0}
    username: ${IW_REDIS_USERNAME:}
    password: ${IW_REDIS_PASSWORD:}
  db:
    driver-class: ${IW_DB_DRIVER_CLASS:}
    url: ${IW_DB_URL:}
    username: ${IW_DB_USERNAME:}
    password: ${IW_DB_PASSWORD:}
  feign:
    secret: ${IW_INTERNAL_SECRET:dev-secret}
  dao:
    data-permission:
      enabled: true
      enable-table-names:
        - eat_meal
        - eat_fridge_food
        - eat_dishes

# 服务器配置
server:
  servlet:
    context-path: /eat-service
  port: 18003

# spring 配置
spring:
  application:
    name: iw-eat-service
  profiles:
    default: dev

# springdoc 配置
springdoc:
  swagger-ui:
    path: /doc.html
  packages-to-scan:
    - com.itwray.iw.eat.controller
