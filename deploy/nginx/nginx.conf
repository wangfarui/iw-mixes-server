# For more information on configuration, see:
#   * Official English Documentation: http://nginx.org/en/docs/
#   * Official Russian Documentation: http://nginx.org/ru/docs/

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log;
pid /run/nginx.pid;

# Load dynamic modules. See /usr/share/doc/nginx/README.dynamic.
include /usr/share/nginx/modules/*.conf;

events {
    worker_connections 1024;
}

http {
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 4096;

    include             /etc/nginx/mime.types;
    default_type        application/octet-stream;

    # Load modular configuration files from the /etc/nginx/conf.d directory.
    # Do not copy deploy/nginx/iw-mixes-server.conf when using this complete nginx.conf.
    include /etc/nginx/conf.d/*.conf;

    upstream iw_core {
        server 172.22.61.87:18080;
        keepalive 16;
    }

    upstream iw_external {
        server 127.0.0.1:18006;
        keepalive 16;
    }

    map $http_origin $iw_cors_origin {
        default "";
        "~^https://(www\.)?itwray\.com$" $http_origin;
        "~^https://web\.itwray\.com$" $http_origin;
        "~^https://blog\.itwray\.com$" $http_origin;
        "~^http://localhost(:[0-9]+)?$" $http_origin;
        "~^http://127\.0\.0\.1(:[0-9]+)?$" $http_origin;
    }

    server {
        listen       80;
        listen       [::]:80;
        server_name  itwray.com www.itwray.com;
        return 301 https://$host$request_uri;

        include /etc/nginx/default.d/*.conf;

        error_page 404 /404.html;
        location = /404.html {
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
        }
    }

    server {
        listen       80;
        listen       [::]:80;
        server_name  blog.itwray.com api.itwray.com;
        return 301 https://$host$request_uri;
    }

    server {
        listen       443 ssl http2;
        listen       [::]:443 ssl http2;
        server_name  itwray.com www.itwray.com;
        root         /usr/share/nginx/iw-mixes-ui;

        index index.html;
        ssl_certificate /etc/letsencrypt/live/itwray.com/fullchain.pem; # managed by Certbot
        ssl_certificate_key /etc/letsencrypt/live/itwray.com/privkey.pem; # managed by Certbot

        ssl_session_cache shared:SSL:1m;
        ssl_session_timeout  10m;
        ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE:ECDH:AES:HIGH:!NULL:!aNULL:!MD5:!ADH:!RC4;
        ssl_protocols TLSv1.1 TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        include /etc/nginx/default.d/*.conf;

        error_page 404 /404.html;
        location = /40x.html {
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
        }
    }

    server {
        listen       443 ssl http2;
        listen       [::]:443 ssl http2;
        server_name  blog.itwray.com;
        root         /usr/share/nginx/wangfarui.github.io;

        ssl_certificate /etc/letsencrypt/live/blog.itwray.com/fullchain.pem; # managed by Certbot
        ssl_certificate_key /etc/letsencrypt/live/blog.itwray.com/privkey.pem; # managed by Certbot
    }

    server {
        listen       443 ssl http2;
        listen       [::]:443 ssl http2;
        server_name  web.itwray.com;
        root         /usr/share/nginx/iw-mixes-web-platform;
        index index.html;

        location / {
            root /usr/share/nginx/iw-mixes-web-platform;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        ssl_certificate /etc/letsencrypt/live/web.itwray.com/fullchain.pem; # managed by Certbot
        ssl_certificate_key /etc/letsencrypt/live/web.itwray.com/privkey.pem; # managed by Certbot
    }

    server {
        listen       443 ssl http2;
        listen       [::]:443 ssl http2;
        server_name  api.itwray.com;

        client_max_body_size 20M;

        add_header Access-Control-Allow-Origin $iw_cors_origin always;
        add_header Access-Control-Allow-Credentials true always;
        add_header Access-Control-Allow-Methods "GET,POST,PUT,DELETE,PATCH,OPTIONS" always;
        add_header Access-Control-Allow-Headers "iwtoken,Authorization,Content-Type,Accept,Origin,X-Requested-With" always;
        add_header Access-Control-Expose-Headers "iwtoken" always;
        add_header Access-Control-Max-Age 86400 always;
        add_header Vary Origin always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        location /auth-service/ {
            proxy_pass http://iw_core/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
        }

        location /bookkeeping-service/ {
            proxy_pass http://iw_core/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
        }

        location /eat-service/ {
            proxy_pass http://iw_core/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
        }

        location /points-service/ {
            proxy_pass http://iw_core/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
        }

        # Public external API controllers keep the /external-service/api prefix.
        location /external-service/api/ {
            proxy_pass http://iw_external;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
        }

        # Public WebSocket entry keeps the old frontend path, but iw-external handles /wb/**.
        location /external-service/wb/ {
            proxy_pass http://iw_external/wb/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 600s;
        }

        # Optional private external internal API entry. Public requests are denied.
        location /external-service/internal/ {
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;

            proxy_pass http://iw_external/internal/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
        }

        location / {
            return 404;
        }

        ssl_certificate /etc/letsencrypt/live/api.itwray.com/fullchain.pem; # managed by Certbot
        ssl_certificate_key /etc/letsencrypt/live/api.itwray.com/privkey.pem; # managed by Certbot
    }

    server {
        server_name nacos-manage.itwray.com;

        location /nacos/ {
            auth_basic "Restricted Content";
            auth_basic_user_file /etc/nginx/.htpasswd;
            proxy_pass http://172.22.61.87:17849/nacos/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
            send_timeout 60s;
        }

        location /nacos {
            return 301 /nacos/;
        }

        listen 443 ssl; # managed by Certbot
        ssl_certificate /etc/letsencrypt/live/nacos-manage.itwray.com/fullchain.pem; # managed by Certbot
        ssl_certificate_key /etc/letsencrypt/live/nacos-manage.itwray.com/privkey.pem; # managed by Certbot
        include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
    }

    server {
        server_name  status.itwray.com;
        root         /usr/share/nginx/site-status;

        listen 443 ssl; # managed by Certbot
        ssl_certificate /etc/letsencrypt/live/status.itwray.com/fullchain.pem; # managed by Certbot
        ssl_certificate_key /etc/letsencrypt/live/status.itwray.com/privkey.pem; # managed by Certbot
        include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
    }

    server {
        server_name  hot.itwray.com;
        root         /usr/share/nginx/daily-hot;

        listen 443 ssl; # managed by Certbot

        ssl_certificate /etc/letsencrypt/live/hot.itwray.com/fullchain.pem; # managed by Certbot
        ssl_certificate_key /etc/letsencrypt/live/hot.itwray.com/privkey.pem; # managed by Certbot
    }

    server {
        server_name  docs.itwray.com;
        root         /usr/share/nginx/docs-house;

        listen 443 ssl;

        ssl_certificate /etc/letsencrypt/live/docs.itwray.com/fullchain.pem; # managed by Certbot
        ssl_certificate_key /etc/letsencrypt/live/docs.itwray.com/privkey.pem; # managed by Certbot
    }

    server {
        server_name  music.itwray.com;
        root         /usr/share/nginx/music-house;

        listen 443 ssl;

        ssl_certificate /etc/letsencrypt/live/music.itwray.com/fullchain.pem; # managed by Certbot
        ssl_certificate_key /etc/letsencrypt/live/music.itwray.com/privkey.pem; # managed by Certbot
    }

    server {
        server_name  status.itwray.com hot.itwray.com docs.itwray.com music.itwray.com;
        listen 80;
        return 301 https://$host$request_uri;
    }
}
