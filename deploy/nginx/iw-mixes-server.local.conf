# Local frontend compatibility entry.
# Put this file under $(brew --prefix)/etc/nginx/servers/ when local WebSocket proxying is needed.

upstream iw_core_local {
    server 127.0.0.1:18080;
    keepalive 16;
}

upstream iw_external_local {
    server 127.0.0.1:18006;
    keepalive 16;
}

server {
    listen 18000;
    server_name localhost 127.0.0.1;

    client_max_body_size 20m;

    location /auth-service/ {
        proxy_pass http://iw_core_local/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /bookkeeping-service/ {
        proxy_pass http://iw_core_local/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /eat-service/ {
        proxy_pass http://iw_core_local/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /points-service/ {
        proxy_pass http://iw_core_local/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /external-service/api/ {
        proxy_pass http://iw_external_local;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /external-service/wb/ {
        proxy_pass http://iw_external_local;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
